name: Test Generation

on:
  schedule:
    # Weekdays 06:00 UTC
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: test-generation
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate Playwright tests from backlog
    timeout-minutes: 120
    runs-on: ubuntu-latest
    environment: dev1
    env:
      DIDAXIS_URL: ${{ secrets.DIDAXIS_URL }}
      DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL }}
      DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD }}
      DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
      ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
      ATLASSIAN_BASE_URL: ${{ secrets.ATLASSIAN_BASE_URL }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure git for agent commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preflight Jira backlog access
        run: node scripts/query-backlog.mjs

      - name: Generate tests from In Progress backlog
        run: |
          agent -p --force --trust --output-format text "$(cat <<'EOF'
          You are the QA orchestrator for this Playwright test repository. Work the Jira "In Progress" backlog for the DS project.

          Budget: process at most 5 tickets this run. Never merge any pull request.

          For each ticket (up to the budget):
          1. Analyze the ticket acceptance criteria (use Jira via Atlassian MCP or REST API with ATLASSIAN_API_TOKEN).
          2. Write a conforming Playwright spec under tests/ following .cursor/rules/playwright-conventions.mdc, the pom-conventions skill, and the api-cleanup skill. Use Page Object Models from pages/; do not modify application source.
          3. Run the spec: npx playwright test <spec-path>
          4. Open a pull request linked to the Jira ticket (reference the ticket key in the branch name, commit message, and PR title/body). Add the tests-generated label to the Jira ticket.
          5. If the run fails due to an app bug, stop on that ticket and summarize the failure; do not open a PR for a red spec.

          Guardrails:
          - Write only under tests/ (and pages/ if new POM methods are required).
          - One ticket per branch/PR when possible.
          - Do not merge PRs; a human approves merge.
          - Stop when the budget of 5 tickets is reached or the In Progress backlog is exhausted.
          EOF
          )"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
